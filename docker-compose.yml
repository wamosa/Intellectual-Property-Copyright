version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: debt-recovery-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: debt_recovery
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - debt-recovery-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: debt-recovery-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/debt_recovery?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      # Optional API keys - add your own
      # OPENAI_API_KEY: your_openai_api_key_here
      # TWILIO_ACCOUNT_SID: your_twilio_account_sid
      # TWILIO_AUTH_TOKEN: your_twilio_auth_token
      # TWILIO_PHONE_NUMBER: your_twilio_phone_number
      # TWILIO_WHATSAPP_NUMBER: whatsapp:+14155238886
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - debt-recovery-network

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: debt-recovery-frontend
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - debt-recovery-network

volumes:
  mongodb_data:
    driver: local

networks:
  debt-recovery-network:
    driver: bridge